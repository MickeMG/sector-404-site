<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Rachell Post Industries Logo</title>
  <desc id="desc">Industrial RPI monogram with Rachell Post Industries wordmark.</desc>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f3f0"/>
      <stop offset="0.42" stop-color="#7f9694"/>
      <stop offset="1" stop-color="#253033"/>
    </linearGradient>
    <linearGradient id="blood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff274f"/>
      <stop offset="1" stop-color="#7b0924"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 .15  0 0 1 0 .3  0 0 0 .45 0" result="hot"/>
      <feMerge><feMergeNode in="hot"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 1H6" stroke="#8fffea" stroke-opacity=".16"/>
    </pattern>
  </defs>
  <rect width="960" height="360" fill="#020405"/>
  <rect x="26" y="26" width="908" height="308" fill="none" stroke="#8fffea" stroke-opacity=".18"/>
  <rect x="44" y="44" width="872" height="272" fill="url(#scan)" opacity=".35"/>
  <g transform="translate(70 54)">
    <path d="M112 0h142c71 0 112 36 112 96 0 42-22 72-59 86l73 122H268l-58-104h-27v104H112V0Zm71 60v83h55c34 0 55-14 55-42s-21-41-55-41h-55Z" fill="url(#steel)"/>
    <path d="M374 0h137c74 0 119 41 119 107 0 68-45 110-119 110h-65v87h-72V0Zm72 62v93h53c36 0 58-16 58-47 0-30-22-46-58-46h-53Z" fill="url(#steel)"/>
    <path d="M666 0h73v304h-73V0Z" fill="url(#steel)"/>
    <path d="M54 0h33v304H54zM781 0h33v304h-33z" fill="url(#blood)" filter="url(#glow)"/>
    <path d="M38 304h792" stroke="#ff274f" stroke-width="6" stroke-linecap="square" opacity=".86"/>
    <path d="M38 0h792" stroke="#8fffea" stroke-width="2" opacity=".28"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-transform="uppercase">
    <text x="480" y="282" text-anchor="middle" fill="#e8f3f0" font-size="31" font-weight="800" letter-spacing="10">RACHELL POST INDUSTRIES</text>
    <text x="480" y="314" text-anchor="middle" fill="#ff274f" font-size="13" font-weight="700" letter-spacing="6">BODY SYSTEMS // SYNTHETICS // SECURITY // DENIAL LAYER ACTIVE</text>
    <text x="50" y="56" fill="#8fffea" fill-opacity=".65" font-size="11" letter-spacing="3">RPI INTERNAL MARK / PUBLIC USE DENIED</text>
    <text x="910" y="56" text-anchor="end" fill="#ff274f" fill-opacity=".65" font-size="11" letter-spacing="3">NO ASSOCIATION</text>
  </g>
</svg>
